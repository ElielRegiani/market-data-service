version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: market-data-postgres
    environment:
      POSTGRES_DB: market_data
      POSTGRES_USER: market_data
      POSTGRES_PASSWORD: market_data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_data -d market_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: market-data-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: market-data-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  market-data-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-data-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/market_data
      DB_USER: market_data
      DB_PASSWORD: market_data
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MARKET_DATA_SYMBOLS: PETR4,VALE3,ITUB4,BTC-USD
      MARKET_DATA_JOB_ENABLED: "true"
      MARKET_DATA_JOB_CRON: "0 10 18 * * MON-FRI"
      MARKET_DATA_JOB_ZONE: "America/Sao_Paulo"

